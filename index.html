<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Service worker sits right at the top to secure multi-threading early -->
  <script src="coi-serviceworker.js"></script>
  <meta name="description" content="A self-contained GitHub Pages chess site that plays against local Stockfish WebAssembly in a browser Web Worker." />
  <title>Max Stockfish Chess</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell" aria-labelledby="app-title">
    <section class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">Browser-only WebAssembly chess</p>
        <h1 id="app-title">Play Stockfish in your browser</h1>
        <p class="subtitle">
          Drop <code>stockfish.js</code> and <code>stockfish.wasm</code> beside these files,
          publish with GitHub Pages, and challenge a local UCI engine worker.
        </p>
      </div>
      <button id="newGameButton" class="primary-button" type="button">New Game</button>
    </section>

    <section class="game-layout" aria-label="Chess game area">
      <div class="board-card">
        <div id="board" class="board" aria-label="Interactive chessboard"></div>
      </div>

      <aside class="panel-card" aria-label="Game information">
        <div class="status-block">
          <span class="label">Engine status</span>
          <div id="engineStatus" class="status ready" role="status" aria-live="polite">Loading Stockfish...</div>
        </div>

        <div class="status-grid">
          <div>
            <span class="label">Side to move</span>
            <strong id="turnIndicator">White</strong>
          </div>
          <div>
            <span class="label">Search depth</span>
            <strong>18 ply</strong>
          </div>
        </div>

        <div class="log-header">
          <h2>Move log</h2>
          <button id="copyFenButton" class="ghost-button" type="button" title="Copy current FEN">Copy FEN</button>
        </div>
        <ol id="moveLog" class="move-log" aria-label="Move history"></ol>
      </aside>
    </section>
  </main>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/chess.js@0.12.1/chess.js"></script>
  <script src="app.js"></script>
</body>
</html>
